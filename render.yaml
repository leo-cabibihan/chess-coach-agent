services:
  - type: web
    name: chess-coach-agent
    runtime: docker
    plan: free
    dockerfilePath: ./apps/chess-coach-agent/Dockerfile
    dockerContext: ./apps/chess-coach-agent
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chess-coach-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: minimax/minimax-m3
      - key: STOCKFISH_DEPTH
        value: "7"
      - key: MONITORING_LOG_PATH
        value: /tmp/chess-coach-events.jsonl
      - key: ENABLE_LOCAL_EMBEDDINGS
        value: "true"

databases:
  - name: chess-coach-db
    plan: free
    databaseName: chess_coach
    user: chess_coach
