name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chess-coach-agent
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: chess_coach_test
          POSTGRES_USER: chess_coach
          POSTGRES_PASSWORD: chess_coach
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chess_coach -d chess_coach_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Backend tests
        run: |
          cd backend
          uv sync --extra dev
          uv run pytest -q
          uv run python -m chess_coach_agent.evaluation --dataset data/eval/critical_moments.jsonl
          uv run python -m chess_coach_agent.retrieval_evaluation --dataset data/eval/retrieval.jsonl
      - name: Postgres migrations and repository integration
        env:
          DATABASE_URL: postgresql+psycopg://chess_coach:chess_coach@127.0.0.1:5432/chess_coach_test
        run: |
          cd backend
          uv run alembic upgrade head
          uv run python -m chess_coach_agent.ingest_knowledge
      - name: Frontend build
        run: |
          cd frontend
          npm install
          npm run build
