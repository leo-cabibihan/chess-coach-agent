services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chess_coach
      POSTGRES_USER: chess_coach
      POSTGRES_PASSWORD: chess_coach
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_coach -d chess_coach"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - chess-coach-postgres:/var/lib/postgresql/data
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - DATABASE_URL=postgresql+psycopg://chess_coach:chess_coach@db:5432/chess_coach
      - ENABLE_LOCAL_EMBEDDINGS=${ENABLE_LOCAL_EMBEDDINGS:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  chess-coach-postgres:
